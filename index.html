<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LUST VAULT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a050f;
            --bg2: #1a0f22;
            --bg3: #2a1a33;
            --pink: #e91e63;
            --pink2: #f06292;
            --pink3: #ff8ab7;
            --glow: rgba(233,30,99,0.4);
            --t1: #f8e1e9;
            --t2: #b07a9e;
            --t3: #6b4a5e;
            --border: rgba(255,255,255,0.06);
            --border-b: rgba(233,30,99,0.2);
            --green: #22c55e;
            --red: #ef4444;
            --r-xl: 26px;
            --r-lg: 20px;
            --r-md: 16px;
            --r-sm: 12px;
            --nav: 72px;
            --sat: env(safe-area-inset-top,0px);
            --sab: env(safe-area-inset-bottom,0px);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
        html{height:100%;overscroll-behavior:none;}
        body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none;}
        .g1{position:fixed;top:-180px;left:50%;transform:translateX(-50%);width:500px;height:400px;background:radial-gradient(ellipse,rgba(233,30,99,.2) 0%,transparent 70%);pointer-events:none;z-index:0;animation:gp 5s ease-in-out infinite;}
        .g2{position:fixed;bottom:80px;right:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(244,63,94,.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
        @keyframes gp{0%,100%{opacity:.8;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.08);}}
        #app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
        .hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px;padding-top:calc(14px + var(--sat));background:rgba(10,5,15,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;}
        .logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,#e91e63,#f06292,#ff8ab7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;user-select:none;cursor:pointer;}
        .hdr-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:22px;padding:5px 12px 5px 5px;}
        .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#e91e63,#f06292);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
        .un{font-size:12px;font-weight:600;color:var(--t2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:calc(var(--nav) + var(--sab) + 20px);display:none;opacity:0;scrollbar-width:none;}
        .page.active{display:block;animation:pi .32s cubic-bezier(.34,1.4,.64,1) forwards;}
        @keyframes pi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--sab));background:rgba(26,15,34,.97);backdrop-filter:blur(30px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:50;}
        .nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:7px 4px;border:none;background:none;outline:none;position:relative;}
        .ni{font-size:24px;line-height:1;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
        .nl{font-size:9.5px;font-weight:600;color:var(--t3);letter-spacing:.2px;transition:color .2s;}
        .np{position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--pink2);opacity:0;transition:opacity .2s;box-shadow:0 0 6px var(--pink2);}
        .nb.on .ni{transform:scale(1.15) translateY(-1px);}
        .nb.on .nl{color:var(--pink3);}
        .nb.on .np{opacity:1;}
        .sh{display:flex;align-items:center;gap:8px;padding:18px 18px 10px;}
        .sd{width:5px;height:5px;border-radius:50%;background:var(--pink2);box-shadow:0 0 8px var(--glow);flex-shrink:0;}
        .sl{font-size:10.5px;font-weight:700;letter-spacing:1.8px;color:var(--t2);text-transform:uppercase;}
        .sc{margin:0 16px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-xl);padding:19px;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s cubic-bezier(.34,1.3,.64,1),border-color .2s,box-shadow .2s;}
        .sc:active{transform:scale(.975);border-color:rgba(233,30,99,.3);box-shadow:0 0 24px rgba(233,30,99,.15);}
        .sct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;}
        .si{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,rgba(233,30,99,.25),rgba(246,63,94,.2));border:1px solid rgba(233,30,99,.25);display:flex;align-items:center;justify-content:center;font-size:26px;}
        .pc{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:6px 12px;font-size:13.5px;font-weight:800;color:#fff;}
        .pd{width:7px;height:7px;border-radius:50%;}
        .pg{background:var(--green);box-shadow:0 0 7px rgba(34,197,94,.6);}
        .sca{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--pink2);text-transform:uppercase;margin-bottom:4px;}
        .scn{font-size:19px;font-weight:800;letter-spacing:-.3px;line-height:1.2;margin-bottom:6px;}
        .scd{font-size:13px;color:var(--t2);line-height:1.55;margin-bottom:13px;}
        .scb{font-size:13.5px;font-weight:700;color:var(--pink3);display:flex;align-items:center;gap:5px;}
        .wallet{margin:14px 16px;background:linear-gradient(135deg,#2a1a33,#1a0f22);border:1px solid var(--border-b);border-radius:var(--r-xl);padding:22px 20px;position:relative;overflow:hidden;}
        .wallet::before{content:'';position:absolute;top:-80px;right:-50px;width:220px;height:220px;background:radial-gradient(circle,rgba(233,30,99,.22),transparent 65%);pointer-events:none;}
        .wl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--pink3);text-transform:uppercase;opacity:.7;margin-bottom:5px;}
        .wa{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:3px;color:#fff;}
        .wa sup{font-size:20px;font-weight:700;opacity:.55;vertical-align:super;margin-right:3px;letter-spacing:0;}
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:var(--r-md);border:none;font-size:15px;font-weight:700;cursor:pointer;outline:none;transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s;letter-spacing:.1px;}
        .btn:active{transform:scale(.96);}
        .bp{background:linear-gradient(135deg,#c2185b,#e91e63,#f06292);color:#fff;box-shadow:0 4px 24px rgba(233,30,99,.45),inset 0 1px 0 rgba(255,255,255,.15);}
        .bs{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--t2);margin-top:10px;}
        .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:200;align-items:flex-end;}
        .ov.open{display:flex;animation:fo .22s ease;}
        @keyframes fo{from{opacity:0;}to{opacity:1;}}
        .sheet{width:100%;background:linear-gradient(180deg,#2a1a33,#1a0f22);border:1px solid rgba(233,30,99,.2);border-bottom:none;border-radius:var(--r-xl) var(--r-xl) 0 0;padding:10px 20px calc(28px + var(--sab));animation:su .34s cubic-bezier(.34,1.4,.64,1);max-height:88vh;overflow-y:auto;}
        .sheet::-webkit-scrollbar{display:none;}
        @keyframes su{from{transform:translateY(100%);opacity:.6;}to{transform:translateY(0);opacity:1;}}
        .dbar{width:34px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 20px;}
        .gallery{ display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:10px 16px;}
        .imgcard{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;}
        .imgcard img{width:100%;height:160px;object-fit:cover;display:block;}
        .imgcard::after{content:'🔞';position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;}
        .toast{position:fixed;top:calc(70px + var(--sat));left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(42,26,51,.97);border:1px solid rgba(233,30,99,.4);border-radius:var(--r-md);padding:12px 20px;font-size:14px;font-weight:700;color:#fff;z-index:9999;pointer-events:none;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;backdrop-filter:blur(20px);}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
<div class="g1"></div>
<div class="g2"></div>
<div id="app">
    <header class="hdr">
        <div class="logo" onclick="handleLogoClick()">💦 LUST VAULT</div>
        <div class="hdr-user">
            <div class="av" id="hav">🔥</div>
            <span class="un" id="hun">Invité</span>
        </div>
    </header>

    <div class="page active" id="p-main">
        <div class="wallet">
            <div class="wl">💰 TON PORTEFEUILLE</div>
            <div class="wa"><sup>€</sup><span id="balDisp">0.00</span></div>
            <div class="ws">Crédits Lust · Prêt à dépenser</div>
            <button class="wrb" onclick="openRech()" style="background:rgba(233,30,99,.2);border:1px solid rgba(233,30,99,.4);color:var(--pink3)">➕ Recharger</button>
        </div>

        <div class="sh"><div class="sd"></div><span class="sl">FEMMES NUES</span></div>
        <div id="womenL" class="gallery"></div>

        <div class="sh"><div class="sd"></div><span class="sl">HOMMES NUS</span></div>
        <div id="menL" class="gallery"></div>

        <div class="sh"><div class="sd"></div><span class="sl">COUPLES &amp; PLUS</span></div>
        <div id="coupleL" class="gallery"></div>
    </div>

    <div class="page" id="p-history">
        <div class="sh"><div class="sd"></div><span class="sl">VUES RÉCENTES</span></div>
        <div id="histL" style="padding:0 16px;"></div>
    </div>

    <nav class="nav">
        <button class="nb on" onclick="goP('main',this)"><span class="ni">🔥</span><span class="nl">Explorer</span><div class="np"></div></button>
        <button class="nb" onclick="goP('history',this)"><span class="ni">📜</span><span class="nl">Historique</span><div class="np"></div></button>
    </nav>
</div>

<!-- PREVIEW OVERLAY -->
<div class="ov" id="previewOv" onclick="closePreview(event)">
    <div class="sheet">
        <div class="dbar"></div>
        <div id="previewImg" style="width:100%;border-radius:16px;overflow:hidden;margin-bottom:16px;"></div>
        <div style="font-size:22px;font-weight:900;margin-bottom:8px" id="pTitle">Titre</div>
        <div style="color:var(--t2);margin-bottom:20px" id="pDesc">Description chaude</div>
        <button class="btn bp" onclick="buyAndUnlock()">💦 Débloquer (2.50€)</button>
        <button class="btn bs" onclick="closePreview()">Fermer</button>
    </div>
</div>

<!-- RECHARGE OVERLAY -->
<div class="ov" id="rechOv" onclick="closeRech(event)">
    <div class="sheet">
        <div class="dbar"></div>
        <div style="text-align:center;margin-bottom:20px">
            <div style="font-size:52px;margin-bottom:12px">💳</div>
            <h2 style="font-size:23px;font-weight:900">Recharger Crédits</h2>
        </div>
        <button class="btn bp" onclick="callSup()">📲 Payer via Support</button>
        <button class="btn bs" onclick="closeRech()">Annuler</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.expand(); tg.enableClosingConfirmation(); }

const myName = tg?.initDataUnsafe?.user?.username ? '@'+tg.initDataUnsafe.user.username : 'Voyeur';
document.getElementById('hun').textContent = myName;
const myId = String(tg?.initDataUnsafe?.user?.id || 'local');

let st = { bal: parseFloat(localStorage.getItem('lust_bal_'+myId)||'12.50'), hist: JSON.parse(localStorage.getItem('lust_hist_'+myId)||'[]') };

function save(){ 
    localStorage.setItem('lust_bal_'+myId, st.bal.toFixed(2));
    localStorage.setItem('lust_hist_'+myId, JSON.stringify(st.hist));
}
function refreshBal(){ document.getElementById('balDisp').textContent = st.bal.toFixed(2); }
refreshBal();

const women = [
    {id:1, url:"https://picsum.photos/id/1011/600/800", title:"Blonde nue sur lit", price:2.50, desc:"Corps parfait, pose ouverte"},
    {id:2, url:"https://picsum.photos/id/1027/600/800", title:"Brune aux seins lourds", price:3.00, desc:"Gros plans explicites"},
    {id:3, url:"https://picsum.photos/id/64/600/800", title:"Rousse en douche", price:2.80, desc:"Eau sur peau mouillée"},
];

const men = [
    {id:4, url:"https://picsum.photos/id/201/600/800", title:"Homme musclé nu", price:2.50, desc:"Corps athlétique en érection"},
    {id:5, url:"https://picsum.photos/id/251/600/800", title:"Mature bien monté", price:2.70, desc:"Gros plan sur le membre"},
];

const couples = [
    {id:6, url:"https://picsum.photos/id/1015/600/800", title:"Couple en pleine action", price:4.00, desc:"Pénétration hardcore"},
    {id:7, url:"https://picsum.photos/id/133/600/800", title:"Lesbien sensuel", price:3.50, desc:"Cunnilingus passionné"},
];

function buildGallery(data, containerId){
    const cont = document.getElementById(containerId);
    cont.innerHTML = '';
    data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'imgcard';
        div.innerHTML = `<img src="${item.url}" alt="${item.title}">`;
        div.onclick = () => openPreview(item);
        cont.appendChild(div);
    });
}

buildGallery(women, 'womenL');
buildGallery(men, 'menL');
buildGallery(couples, 'coupleL');

let currentItem = null;

function openPreview(item){
    currentItem = item;
    const prev = document.getElementById('previewImg');
    prev.innerHTML = `<img src="${item.url}" style="width:100%;display:block;">`;
    document.getElementById('pTitle').textContent = item.title;
    document.getElementById('pDesc').textContent = item.desc;
    document.getElementById('previewOv').classList.add('open');
}

function closePreview(e){
    if(!e || e.target.id === 'previewOv') document.getElementById('previewOv').classList.remove('open');
}

function buyAndUnlock(){
    if(!currentItem) return;
    if(st.bal < currentItem.price){
        showToast("❌ Crédits insuffisants");
        return;
    }
    st.bal -= currentItem.price;
    st.hist.unshift({title: currentItem.title, date: new Date().toLocaleDateString('fr-FR')});
    save();
    refreshBal();
    closePreview();
    showToast("✅ Contenu débloqué ! Masturbe-toi bien 🔥");
}

function showToast(m){
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2800);
}

function goP(p, btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
    document.getElementById('p-'+p).classList.add('active');
    btn.classList.add('on');
    if(p==='history') renderHistory();
}

function renderHistory(){
    const cont = document.getElementById('histL');
    if(st.hist.length===0){
        cont.innerHTML = `<div style="text-align:center;padding:80px 20px;color:var(--t2)">Aucune vue récente</div>`;
        return;
    }
    cont.innerHTML = '';
    st.hist.forEach(h=>{
        const d = document.createElement('div');
        d.style = "background:#2a1a33;border:1px solid #4a2a44;border-radius:14px;padding:14px;margin-bottom:10px;";
        d.innerHTML = `<strong>${h.title}</strong><br><small style="color:var(--t3)">Vu le ${h.date}</small>`;
        cont.appendChild(d);
    });
}

function openRech(){ document.getElementById('rechOv').classList.add('open'); }
function closeRech(e){ if(!e || e.target.id==='rechOv') document.getElementById('rechOv').classList.remove('open'); }
function callSup(){ window.open('https://t.me/zeromeufuhq','_blank'); }

// Admin hidden (logo clicks)
let clicks=0;
function handleLogoClick(){
    clicks++;
    if(clicks>6){
        clicks=0;
        showToast("🔓 Mode Admin activé (simulation)");
    }
}

// Init
renderHistory();
</script>
</body>
</html>
